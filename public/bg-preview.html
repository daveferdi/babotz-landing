<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>בַּבּוֹץ — רקע</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1a120a; overflow: hidden; }
  canvas { display: block; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
// Generate a seamless tileable topographic earth background
// Then tile it across the screen to prove seamlessness
(function() {
  const TILE = 512; // tile size
  const canvas = document.getElementById('c');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  const ctx = canvas.getContext('2d');

  // Create offscreen tile
  const tile = document.createElement('canvas');
  tile.width = TILE;
  tile.height = TILE;
  const tc = tile.getContext('2d');

  // --- Seamless noise (wrapping) ---
  // Permutation table
  const perm = new Uint8Array(512);
  const p = new Uint8Array(256);
  for (let i = 0; i < 256; i++) p[i] = i;
  for (let i = 255; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [p[i], p[j]] = [p[j], p[i]];
  }
  for (let i = 0; i < 512; i++) perm[i] = p[i & 255];

  function fade(t) { return t * t * t * (t * (t * 6 - 15) + 10); }
  function lerp(a, b, t) { return a + t * (b - a); }
  function grad(hash, x, y) {
    const h = hash & 3;
    const u = h < 2 ? x : y;
    const v = h < 2 ? y : x;
    return ((h & 1) ? -u : u) + ((h & 2) ? -v : v);
  }

  function perlin(x, y) {
    const X = Math.floor(x) & 255;
    const Y = Math.floor(y) & 255;
    const xf = x - Math.floor(x);
    const yf = y - Math.floor(y);
    const u = fade(xf);
    const v = fade(yf);
    const aa = perm[perm[X] + Y];
    const ab = perm[perm[X] + Y + 1];
    const ba = perm[perm[X + 1] + Y];
    const bb = perm[perm[X + 1] + Y + 1];
    return lerp(
      lerp(grad(aa, xf, yf), grad(ba, xf - 1, yf), u),
      lerp(grad(ab, xf, yf - 1), grad(bb, xf - 1, yf - 1), u),
      v
    );
  }

  // Seamless noise — wraps at period
  function seamlessNoise(x, y, period, scale) {
    const s = scale || 1;
    const nx = x / period;
    const ny = y / period;
    // Sample 4D noise mapped to torus for seamless tiling
    const TWO_PI = Math.PI * 2;
    const cx = Math.cos(nx * TWO_PI) * s;
    const cy = Math.sin(nx * TWO_PI) * s;
    const cz = Math.cos(ny * TWO_PI) * s;
    const cw = Math.sin(ny * TWO_PI) * s;
    // Use 2D perlin at 4 shifted positions and combine
    return (
      perlin(cx + 7.3, cz + 3.7) * 0.5 +
      perlin(cy + 13.1, cw + 17.9) * 0.3 +
      perlin(cx * 2 + cz + 5.5, cy * 2 + cw + 11.1) * 0.2
    );
  }

  function fbmSeamless(x, y, period, octaves) {
    let v = 0, amp = 1, freq = 1, maxAmp = 0;
    for (let i = 0; i < octaves; i++) {
      v += seamlessNoise(x * freq, y * freq, period * freq, freq * 0.8) * amp;
      maxAmp += amp;
      amp *= 0.5;
      freq *= 2;
    }
    return v / maxAmp;
  }

  // --- Color palette ---
  const palette = [
    [34, 22, 14],     // deep chocolate
    [62, 38, 22],     // dark earth
    [106, 65, 38],    // sienna
    [154, 95, 58],    // terracotta
    [180, 120, 72],   // warm ochre
    [200, 160, 110],  // sand
    [220, 195, 165],  // light sand
    [235, 218, 198],  // cream
    [242, 232, 218],  // off-white
  ];

  function getColor(t) {
    // t: 0..1, maps through palette
    const idx = t * (palette.length - 1);
    const i = Math.floor(idx);
    const f = idx - i;
    const c1 = palette[Math.min(i, palette.length - 1)];
    const c2 = palette[Math.min(i + 1, palette.length - 1)];
    return [
      c1[0] + (c2[0] - c1[0]) * f,
      c1[1] + (c2[1] - c1[1]) * f,
      c1[2] + (c2[2] - c1[2]) * f,
    ];
  }

  // --- Generate tile ---
  const imgData = tc.createImageData(TILE, TILE);
  const data = imgData.data;

  for (let y = 0; y < TILE; y++) {
    for (let x = 0; x < TILE; x++) {
      const idx = (y * TILE + x) * 4;

      // Topographic layers using seamless fbm
      const n1 = fbmSeamless(x, y, TILE, 5);
      const n2 = fbmSeamless(x + 200, y + 300, TILE, 3);

      // Warp coordinates for organic feel
      const wx = x + n2 * TILE * 0.08;
      const wy = y + n1 * TILE * 0.06;
      const nFinal = fbmSeamless(wx, wy, TILE, 5);

      // Map to 0..1 — bias toward middle tones (earth/terracotta)
      let v = nFinal * 0.5 + 0.5;
      // Emphasize layers — quantize slightly for topographic banding
      const bands = 12;
      const banded = Math.floor(v * bands) / bands;
      v = v * 0.6 + banded * 0.4;
      v = Math.max(0, Math.min(1, v));

      // Get base color
      const col = getColor(v);

      // --- Paper/linen texture ---
      // Fine grain noise (not seamless but at high freq it's invisible)
      const grain = (Math.random() - 0.5) * 18;
      // Larger linen fiber structure
      const fiber = Math.sin(x * 0.8 + Math.random() * 0.3) * Math.cos(y * 0.6 + Math.random() * 0.3) * 6;

      // --- Surface lighting for depth ---
      // Sample neighbors for fake normal
      const nL = fbmSeamless(wx - 1, wy, TILE, 3);
      const nR = fbmSeamless(wx + 1, wy, TILE, 3);
      const nU = fbmSeamless(wx, wy - 1, TILE, 3);
      const nD = fbmSeamless(wx, wy + 1, TILE, 3);
      const dx = (nR - nL) * 4;
      const dy = (nD - nU) * 4;
      const light = 0.85 + dx * 0.12 - dy * 0.08;

      data[idx]     = Math.max(0, Math.min(255, col[0] * light + grain + fiber));
      data[idx + 1] = Math.max(0, Math.min(255, col[1] * light + grain + fiber * 0.8));
      data[idx + 2] = Math.max(0, Math.min(255, col[2] * light + grain + fiber * 0.6));
      data[idx + 3] = 255;
    }
  }

  tc.putImageData(imgData, 0, 0);

  // --- Tile across screen ---
  const pat = ctx.createPattern(tile, 'repeat');
  ctx.fillStyle = pat;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Resize handler
  window.addEventListener('resize', () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    const pat2 = ctx.createPattern(tile, 'repeat');
    ctx.fillStyle = pat2;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
  });

  // --- Save tile as downloadable PNG ---
  // Add download link
  const link = document.createElement('a');
  link.download = 'babotz-bg-tile.png';
  link.href = tile.toDataURL('image/png');
  link.textContent = 'הורד אריח';
  link.style.cssText = 'position:fixed;bottom:20px;right:20px;z-index:10;background:rgba(0,0,0,0.6);color:#EDE0D2;padding:10px 20px;border-radius:6px;font-family:sans-serif;font-size:13px;text-decoration:none;';
  document.body.appendChild(link);

  // Also save the tile to be used by the site
  tile.toBlob(blob => {
    // Can't auto-save, but the download link works
  }, 'image/png');

})();
</script>
</body>
</html>
